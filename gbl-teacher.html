<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBL 강사 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1A2E4A;--navy2:#2A4A72;--navy3:#3D6494;
  --orange:#E8650A;--orangePl:#FDF0E6;
  --teal:#1D9E75;--tealPl:#E1F5EE;
  --gold:#F5A623;
  --white:#FFFFFF;--grayLt:#F4F6F8;--grayBd:#CBD5E0;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F1A28;color:#fff;min-height:100vh;}
.dash-header{background:#0A1220;padding:14px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,.08);}
.logo{width:38px;height:38px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;}
.dash-header h1{font-size:17px;font-weight:600;}
.dash-header p{font-size:12px;color:#7A9ABF;margin-top:1px;}
.live-badge{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:#7A9ABF;}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.clock{font-size:13px;color:#AABCD0;font-variant-numeric:tabular-nums;}
.dash-body{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 62px);overflow:hidden;}
.sidebar{background:#0A1220;border-right:1px solid rgba(255,255,255,.08);overflow-y:auto;padding:16px;}
.main-panel{overflow-y:auto;padding:20px;}
.sidebar-label{font-size:11px;font-weight:600;color:#7A9ABF;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.sidebar-section{margin-bottom:20px;}
/* 타이머 */
.timer-wrap{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;margin-bottom:16px;}
.timer-display{font-size:36px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;text-align:center;letter-spacing:-1px;}
.timer-sub{font-size:11px;color:#7A9ABF;text-align:center;margin:4px 0 10px;}
.timer-btns{display:flex;gap:6px;margin-bottom:8px;}
.timer-btns button{flex:1;padding:8px;font-size:12px;font-weight:600;border:none;border-radius:8px;cursor:pointer;}
.tb-start{background:var(--teal);color:#fff;}
.tb-pause{background:#2A4A72;color:#fff;display:none;}
.tb-reset{background:rgba(255,255,255,.08);color:#fff;}
.preset-row{display:flex;gap:4px;flex-wrap:wrap;}
.preset-btn{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#AABCD0;cursor:pointer;}
.preset-btn:hover{background:rgba(255,255,255,.15);color:#fff;}
/* 점수판 */
.score-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);cursor:pointer;}
.score-row:hover{background:rgba(255,255,255,.08);}
.score-row.selected{border-color:var(--orange);}
.rank{font-size:16px;font-weight:700;color:var(--orange);min-width:22px;}
.rank.top{color:#FFD700;}
.team-info{flex:1;}
.team-name-s{font-size:13px;font-weight:600;color:#fff;}
.team-members-s{font-size:11px;color:#7A9ABF;margin-top:1px;}
.pts{font-size:18px;font-weight:700;color:var(--orange);}
.score-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:4px;}
.score-bar-fill{height:100%;border-radius:2px;transition:width .5s;}
/* 점수부여 */
.score-give{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;}
.score-give select{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:8px;padding:9px 10px;font-size:13px;margin-bottom:8px;outline:none;}
.score-give select option{background:#1A2E4A;}
.score-give button{width:100%;background:var(--orange);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;}
/* 메인 */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;text-align:center;}
.stat-label{font-size:11px;color:#7A9ABF;margin-bottom:8px;}
.stat-num{font-size:28px;font-weight:700;color:var(--orange);}
.stat-num.teal{color:var(--teal);}
.stat-sub{font-size:11px;color:#7A9ABF;margin-top:2px;}
.section-title{font-size:16px;font-weight:600;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.badge-live{font-size:11px;background:var(--orange);color:#fff;padding:2px 10px;border-radius:20px;}
.team-status-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.team-status-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;}
.team-status-card h3{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.mission-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;margin:2px;}
.mission-pill.done{background:#1D9E7520;color:var(--teal);border:1px solid #1D9E7550;}
.mission-pill.pending{background:rgba(255,255,255,.05);color:#7A9ABF;border:1px solid rgba(255,255,255,.08);}
.member-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 10px;margin:2px;color:#AABCD0;}
/* 뷰어 */
.answer-viewer{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:12px;}
.answer-field{margin-bottom:12px;}
.afl{font-size:11px;color:#7A9ABF;margin-bottom:4px;}
.afv{font-size:13px;color:#DDEEFF;line-height:1.7;white-space:pre-wrap;background:rgba(255,255,255,.04);border-radius:8px;padding:10px 12px;}
.afv.empty{color:#7A9ABF;font-style:italic;}
/* 로그 */
.log-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;}
.log-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:4px;}
.log-time{color:#7A9ABF;min-width:45px;}
.log-team{font-weight:600;min-width:50px;}
.log-msg{color:#AABCD0;}
/* toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--teal);color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="dash-header">
  <div class="logo">GBL</div>
  <div><h1>강사 대시보드</h1><p>게임기반 학습 · 청소년교육상담학과 · 14명</p></div>
  <div class="live-badge"><div class="live-dot"></div> LIVE <span class="clock" id="clock">00:00:00</span></div>
</div>

<div class="dash-body">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">타이머</div>
      <div class="timer-wrap">
        <div class="timer-display" id="timer-display">05:00</div>
        <div class="timer-sub" id="timer-sub">준비</div>
        <div class="timer-btns">
          <button class="tb-start" id="tb-start" onclick="timerToggle()">▶ 시작</button>
          <button class="tb-pause" id="tb-pause" onclick="timerPause()">⏸ 정지</button>
          <button class="tb-reset" onclick="timerReset()">↺</button>
        </div>
        <div class="preset-row">
          <span class="preset-btn" onclick="setTimer(5,'퀴즈레이스')">5분 퀴즈</span>
          <span class="preset-btn" onclick="setTimer(10,'조별 논의')">10분 논의</span>
          <span class="preset-btn" onclick="setTimer(15,'미션 게임')">15분 미션</span>
          <span class="preset-btn" onclick="setTimer(3,'발표 준비')">3분 발표</span>
          <span class="preset-btn" onclick="setTimer(7,'갤러리 워크')">7분 갤러리</span>
          <span class="preset-btn" onclick="setTimer(10,'성찰 작성')">10분 성찰</span>
        </div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">실시간 점수판</div>
      <div id="score-board"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">점수 부여</div>
      <div class="score-give">
        <select id="score-team-sel">
          <option value="">조 선택</option>
          <option value="t1">1조 · 나침반</option>
          <option value="t2">2조 · 씨앗</option>
          <option value="t3">3조 · 파도</option>
          <option value="t4">4조 · 별자리</option>
        </select>
        <select id="score-event-sel">
          <option value="">이벤트 선택</option>
          <option value="10">퀴즈 정답 +10점</option>
          <option value="20">미션 완료 1등 +20점</option>
          <option value="15">미션 2등 / 발표 +15점</option>
          <option value="10">미션 3등 / 피드백 +10점</option>
          <option value="5">미션 4등 / 성찰 +5점</option>
          <option value="-5">규칙 위반 -5점</option>
        </select>
        <button onclick="giveScore()">점수 부여 →</button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">실시간 활동 로그</div>
      <div id="activity-log"></div>
    </div>
  </div>

  <div class="main-panel">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">접속 인원</div><div class="stat-num" id="stat-members">0</div><div class="stat-sub">/ 14명</div></div>
      <div class="stat-card"><div class="stat-label">미션 제출 수</div><div class="stat-num teal" id="stat-submits">0</div><div class="stat-sub">/ 16건</div></div>
      <div class="stat-card"><div class="stat-label">현재 1위</div><div class="stat-num" id="stat-top" style="font-size:18px">—</div><div class="stat-sub" id="stat-top-pts">0점</div></div>
      <div class="stat-card"><div class="stat-label">세션 키</div><div class="stat-num" style="font-size:16px;font-family:monospace">gbl2024</div><div class="stat-sub">학생·강사 동일</div></div>
    </div>
    <div class="section-title">조별 미션 제출 현황 <span class="badge-live">LIVE</span></div>
    <div class="team-status-grid" id="team-status"></div>
    <div class="section-title">제출 내용 보기 <span class="badge-live">조를 클릭해서 선택</span></div>
    <div id="answer-viewer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyC_Gdcs6y_Eh_EFb7xrhLNvu4-6we3pCHk",
  authDomain:        "gbl-sch14.firebaseapp.com",
  databaseURL:       "https://gbl-sch14-default-rtdb.firebaseio.com",
  projectId:         "gbl-sch14",
  storageBucket:     "gbl-sch14.firebasestorage.app",
  messagingSenderId: "713132939192",
  appId:             "1:713132939192:web:6aa9d0a027dcffe731e14d"
};
const SESSION = 'gbl2024';

let db = null;
try { firebase.initializeApp(FIREBASE_CONFIG); db = firebase.database(); } catch(e){ console.warn(e); }

const TEAMS = [
  {id:'t1',num:'1조',name:'나침반',color:'#E8650A'},
  {id:'t2',num:'2조',name:'씨앗',  color:'#1D9E75'},
  {id:'t3',num:'3조',name:'파도',  color:'#185FA5'},
  {id:'t4',num:'4조',name:'별자리',color:'#7F77DD'},
];
const MISSIONS = ['m1','m2','m3','reflect'];
const MISSION_LABELS = {m1:'M1 목표설정',m2:'M2 시나리오',m3:'M3 루브릭',reflect:'성찰'};
const MISSION_FIELDS = {
  m1:['target','goals','gbl'],
  m2:['intro','main','close','tools','facilitator'],
  m3:['rubric','feedback','wrap'],
  reflect:['q1','q2','q3']
};
const FIELD_LABELS = {
  target:'대상 집단',goals:'프로그램 목표',gbl:'GBL 요소 적용',
  intro:'도입 단계',main:'전개 단계',close:'마무리 단계',tools:'사용 도구',facilitator:'촉진자 역할',
  rubric:'평가 루브릭',feedback:'즉각적 피드백',wrap:'마무리 정리',
  q1:'인상 깊은 장면',q2:'경험한 GBL 원리',q3:'현장 적용 아이디어'
};

let scores={t1:0,t2:0,t3:0,t4:0};
let members={t1:{},t2:{},t3:{},t4:{}};
let submissions={t1:{},t2:{},t3:{},t4:{}};
let selectedTeam='t1', selectedMission='m1';
let logItems=[];
let timerSec=300, timerRunning=false, timerInterval=null;

window.onload = function() {
  renderScoreBoard(); renderTeamStatus(); renderAnswerViewer();
  setInterval(updateClock,1000); updateClock();

  if(!db) return;
  db.ref(SESSION+'/scores').on('value', snap=>{
    const d=snap.val()||{};
    Object.keys(d).forEach(k=>{if(scores[k]!==undefined)scores[k]=d[k];});
    renderScoreBoard(); renderTeamStatus(); updateStatCards();
  });
  db.ref(SESSION+'/members').on('value', snap=>{
    members=snap.val()||{t1:{},t2:{},t3:{},t4:{}};
    renderTeamStatus(); updateStatCards();
  });
  db.ref(SESSION+'/submissions').on('value', snap=>{
    submissions=snap.val()||{t1:{},t2:{},t3:{},t4:{}};
    renderTeamStatus(); renderAnswerViewer(); updateStatCards();
  });
  db.ref(SESSION+'/log').on('value', snap=>{
    const d=snap.val()||{};
    logItems=Object.values(d).sort((a,b)=>(b.at||0)-(a.at||0)).slice(0,30);
    renderLog();
  });
};

function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
}

function renderScoreBoard(){
  const sorted=[...TEAMS].sort((a,b)=>(scores[b.id]||0)-(scores[a.id]||0));
  const max=Math.max(...Object.values(scores),1);
  const c=document.getElementById('score-board'); if(!c)return;
  c.innerHTML='';
  sorted.forEach((t,i)=>{
    const s=scores[t.id]||0;
    const div=document.createElement('div');
    div.className='score-row'+(t.id===selectedTeam?' selected':'');
    div.innerHTML='<div class="rank'+(i===0?' top':'')+'">'+(i+1)+'</div>'+
      '<div class="team-info">'+
        '<div class="team-name-s">'+t.num+' · '+t.name+'</div>'+
        '<div class="team-members-s">'+Object.values(members[t.id]||{}).map(m=>m.name).join(' · ')+'</div>'+
        '<div class="score-bar"><div class="score-bar-fill" style="width:'+Math.round(s/max*100)+'%;background:'+t.color+'"></div></div>'+
      '</div>'+
      '<div class="pts">'+s+'점</div>';
    div.onclick=()=>{selectedTeam=t.id;renderAnswerViewer();renderScoreBoard();};
    c.appendChild(div);
  });
}

function updateStatCards(){
  const tm=Object.values(members).reduce((s,m)=>s+Object.keys(m).length,0);
  const ts=Object.values(submissions).reduce((s,t)=>s+MISSIONS.filter(mid=>t[mid]&&t[mid]._submitted).length,0);
  const el_m=document.getElementById('stat-members');
  const el_s=document.getElementById('stat-submits');
  if(el_m)el_m.textContent=tm;
  if(el_s)el_s.textContent=ts;
  const sorted=[...TEAMS].sort((a,b)=>(scores[b.id]||0)-(scores[a.id]||0));
  const el_t=document.getElementById('stat-top');
  const el_tp=document.getElementById('stat-top-pts');
  if(el_t)el_t.textContent=sorted[0]?sorted[0].num:'—';
  if(el_tp)el_tp.textContent=sorted[0]?(scores[sorted[0].id]||0)+'점':'0점';
}

function giveScore(){
  const ts=document.getElementById('score-team-sel').value;
  const es=document.getElementById('score-event-sel').value;
  const pts=parseInt(es);
  if(!ts||isNaN(pts))return;
  const t=TEAMS.find(x=>x.id===ts);
  scores[ts]=(scores[ts]||0)+pts;
  if(db) db.ref(SESSION+'/scores/'+ts).set(scores[ts]);
  const lbl=document.getElementById('score-event-sel').options[document.getElementById('score-event-sel').selectedIndex].text;
  if(db) db.ref(SESSION+'/log').push({team:t.num,teamId:ts,event:'score',label:lbl,at:Date.now()});
  renderScoreBoard(); updateStatCards();
  showToast(t.num+' '+(pts>0?'+':'')+pts+'점 부여');
}

function renderTeamStatus(){
  const c=document.getElementById('team-status'); if(!c)return;
  c.innerHTML='';
  TEAMS.forEach(t=>{
    const div=document.createElement('div');
    div.className='team-status-card';
    const mlist=Object.values(members[t.id]||{}).map(m=>'<span class="member-chip">'+m.name+' <span style="color:'+t.color+';font-size:10px">'+(m.role||'')+'</span></span>').join('');
    const pills=MISSIONS.map(mid=>{
      const done=submissions[t.id]&&submissions[t.id][mid]&&submissions[t.id][mid]._submitted;
      return '<span class="mission-pill '+(done?'done':'pending')+'">'+(done?'✓ ':'')+MISSION_LABELS[mid]+'</span>';
    }).join('');
    div.innerHTML='<h3 style="color:'+t.color+'">'+t.num+' · '+t.name+' <span style="font-size:12px;color:#7A9ABF;font-weight:400">'+(scores[t.id]||0)+'점</span></h3>'+
      '<div style="margin-bottom:8px">'+(mlist||'<span style="font-size:12px;color:#7A9ABF">접속 대기 중...</span>')+'</div>'+
      '<div>'+pills+'</div>';
    c.appendChild(div);
  });
}

function renderAnswerViewer(){
  const c=document.getElementById('answer-viewer'); if(!c)return;
  c.innerHTML='';
  const t=TEAMS.find(x=>x.id===selectedTeam);
  const tabRow=document.createElement('div');
  tabRow.style.cssText='display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;';
  MISSIONS.forEach(mid=>{
    const btn=document.createElement('button');
    btn.textContent=MISSION_LABELS[mid];
    const done=submissions[selectedTeam]&&submissions[selectedTeam][mid]&&submissions[selectedTeam][mid]._submitted;
    btn.style.cssText='padding:6px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:'+(mid===selectedMission?t.color:'rgba(255,255,255,.07)')+';color:'+(mid===selectedMission?'#fff':(done?'#1D9E75':'#7A9ABF'))+';';
    btn.onclick=()=>{selectedMission=mid;renderAnswerViewer();};
    tabRow.appendChild(btn);
  });
  c.appendChild(tabRow);

  const fields=MISSION_FIELDS[selectedMission]||[];
  const data=submissions[selectedTeam]&&submissions[selectedTeam][selectedMission]||{};
  const isSubmitted=!!(data._submitted);
  const badge=document.createElement('div');
  badge.style.cssText='font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:12px;background:'+(isSubmitted?'#1D9E7520':'rgba(255,255,255,.06)')+';color:'+(isSubmitted?'#1D9E75':'#7A9ABF')+';border:1px solid '+(isSubmitted?'#1D9E7540':'rgba(255,255,255,.1)')+';';
  badge.textContent=isSubmitted?'✓ 제출 완료 — '+(data._submitted&&data._submitted.by||''):'미제출';
  c.appendChild(badge);

  fields.forEach(fk=>{
    const val=data[fk]&&data[fk].value||'';
    const div=document.createElement('div');
    div.className='answer-field';
    div.innerHTML='<div class="afl">'+(FIELD_LABELS[fk]||fk)+'</div><div class="afv'+(val?'':' empty')+'">'+(val||'아직 작성 전')+'</div>';
    c.appendChild(div);
  });
}

function renderLog(){
  const c=document.getElementById('activity-log'); if(!c)return;
  c.innerHTML='';
  logItems.slice(0,15).forEach(item=>{
    const t=item.at?new Date(item.at):new Date();
    const div=document.createElement('div');
    div.className='log-item';
    div.innerHTML='<div class="log-dot"></div>'+
      '<div class="log-time">'+String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0')+'</div>'+
      '<div class="log-team" style="color:'+(TEAMS.find(x=>x.id===item.teamId)||{color:'#aaa'}).color+'">'+(item.team||'')+'</div>'+
      '<div class="log-msg">'+(item.label||item.event||'')+'</div>';
    c.appendChild(div);
  });
}

// 타이머
let timerLabel='준비';
function updateTimerDisplay(){
  const m=Math.floor(timerSec/60),s=timerSec%60;
  document.getElementById('timer-display').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function timerToggle(){
  timerRunning=true;
  document.getElementById('tb-start').style.display='none';
  document.getElementById('tb-pause').style.display='flex';
  timerInterval=setInterval(()=>{
    if(timerSec<=0){clearInterval(timerInterval);timerRunning=false;document.getElementById('timer-sub').textContent='⏰ 종료!';document.getElementById('tb-start').style.display='flex';document.getElementById('tb-pause').style.display='none';return;}
    timerSec--;updateTimerDisplay();
  },1000);
}
function timerPause(){
  clearInterval(timerInterval);timerRunning=false;
  document.getElementById('tb-start').style.display='flex';
  document.getElementById('tb-pause').style.display='none';
}
function timerReset(){
  timerPause();timerSec=300;
  document.getElementById('timer-sub').textContent=timerLabel;
  updateTimerDisplay();
}
function setTimer(min,label){
  timerPause();timerSec=min*60;timerLabel=label;
  document.getElementById('timer-sub').textContent=label;
  updateTimerDisplay();
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
updateTimerDisplay();
</script>
