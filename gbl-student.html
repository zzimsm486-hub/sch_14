<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GBL 미션카드 — 학생용</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1A2E4A;--navy2:#2A4A72;
  --orange:#E8650A;--orangePl:#FDF0E6;
  --teal:#1D9E75;--tealPl:#E1F5EE;
  --white:#FFFFFF;--grayLt:#F4F6F8;--grayBd:#CBD5E0;
  --text:#1A202C;--textSub:#4A5568;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--grayLt);color:var(--text);min-height:100vh;}
.app-header{background:var(--navy);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.app-header .logo{width:36px;height:36px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;}
.app-header h1{font-size:16px;font-weight:600;color:#fff;}
.app-header p{font-size:12px;color:#AABCD0;margin-top:1px;}
.step-badge{margin-left:auto;background:var(--orange);color:#fff;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;white-space:nowrap;}
#setup-screen{padding:20px;}
.setup-card{background:var(--white);border-radius:16px;padding:24px;border:1px solid var(--grayBd);max-width:480px;margin:0 auto;}
.setup-card h2{font-size:18px;font-weight:600;color:var(--navy);margin-bottom:6px;}
.setup-card p{font-size:13px;color:var(--textSub);margin-bottom:20px;line-height:1.6;}
.field-label{font-size:13px;font-weight:500;color:var(--textSub);margin-bottom:6px;display:block;}
.field-input{width:100%;border:1.5px solid var(--grayBd);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--text);background:#fff;outline:none;margin-bottom:20px;}
.field-input:focus{border-color:var(--orange);}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.team-btn{border:1.5px solid var(--grayBd);border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;background:#fff;transition:all .15s;}
.team-btn.active{border-color:var(--orange);background:var(--orangePl);}
.team-btn .t-num{font-size:20px;font-weight:700;color:var(--orange);}
.team-btn .t-name{font-size:12px;color:var(--textSub);margin-top:2px;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;}
.role-btn{border:1.5px solid var(--grayBd);border-radius:10px;padding:12px;text-align:center;cursor:pointer;background:#fff;transition:all .15s;}
.role-btn.active{border-color:var(--orange);background:var(--orangePl);}
.role-btn .role-icon{font-size:22px;margin-bottom:4px;}
.role-btn .role-name{font-size:13px;font-weight:600;color:var(--navy);}
.role-btn .role-desc{font-size:11px;color:var(--textSub);margin-top:2px;}
.btn-start{width:100%;background:var(--orange);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:600;cursor:pointer;}
.btn-start:hover{background:#C8550A;}
#mission-screen{display:none;padding:16px;}
.mission-nav{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;}
.mission-tab{flex-shrink:0;border:1.5px solid var(--grayBd);border-radius:20px;padding:7px 16px;font-size:13px;font-weight:500;color:var(--textSub);cursor:pointer;background:#fff;white-space:nowrap;}
.mission-tab.active{border-color:var(--orange);background:var(--orange);color:#fff;}
.mission-tab.done{border-color:var(--teal);background:var(--tealPl);color:var(--teal);}
.mission-card{background:#fff;border-radius:16px;border:1px solid var(--grayBd);overflow:hidden;margin-bottom:12px;}
.mission-head{padding:16px 18px;display:flex;align-items:center;gap:12px;}
.mission-badge{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;}
.mission-head-info h3{font-size:15px;font-weight:600;color:var(--navy);}
.mission-head-info p{font-size:12px;color:var(--textSub);margin-top:2px;}
.mission-desc{padding:12px 18px 16px;font-size:13px;color:var(--textSub);line-height:1.7;background:var(--grayLt);border-top:1px solid var(--grayBd);}
.field-group{padding:0 18px 18px;}
.field-group label{font-size:12px;font-weight:500;color:var(--textSub);display:block;margin:14px 0 5px;}
.field-group textarea{width:100%;border:1.5px solid var(--grayBd);border-radius:10px;padding:12px;font-size:14px;color:var(--text);resize:vertical;min-height:90px;font-family:inherit;outline:none;line-height:1.6;}
.field-group textarea:focus{border-color:var(--orange);}
.submit-row{padding:0 18px 18px;display:flex;gap:8px;align-items:center;}
.btn-submit{flex:1;background:var(--navy);color:#fff;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;}
.btn-submit.done{background:var(--teal);}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;}
.save-status{font-size:12px;color:var(--textSub);}
.save-status.ok{color:var(--teal);}
.progress-wrap{padding:12px 20px 0;max-width:480px;margin:0 auto;}
.progress-bar{height:6px;background:var(--grayBd);border-radius:3px;overflow:hidden;margin-top:5px;}
.progress-fill{height:100%;background:var(--orange);border-radius:3px;transition:width .4s;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="app-header">
  <div class="logo">GBL</div>
  <div>
    <h1>미션카드 워크시트</h1>
    <p id="app-header-info">게임기반 학습 · 청소년교육상담학과</p>
  </div>
  <div class="step-badge" id="progress-label-done">0 / 4 완료</div>
</div>

<div id="setup-screen" style="padding-top:20px">
  <div class="setup-card">
    <h2>수업 시작 전 정보 입력</h2>
    <p>아래 정보를 입력하면 조별 미션카드가 열립니다.<br>강사 대시보드에 실시간으로 연동됩니다.</p>
    <label class="field-label">이름</label>
    <input type="text" id="name-input" class="field-input" placeholder="예) 김민준">
    <label class="field-label">소속 조 선택</label>
    <div class="team-grid" id="team-grid"></div>
    <label class="field-label">역할 선택</label>
    <div class="role-grid" id="role-grid"></div>
    <button class="btn-start" id="btn-start">미션 시작하기 →</button>
  </div>
</div>

<div id="mission-screen" style="display:none">
  <div class="progress-wrap">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--textSub)">
      <span>진행률</span><span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div style="padding:16px">
    <div class="mission-nav" id="mission-nav"></div>
    <div id="mission-body"></div>
  </div>
</div>

<div id="complete-screen" style="display:none;padding:40px 20px;text-align:center">
  <div style="font-size:56px;margin-bottom:16px">🎉</div>
  <h2 style="font-size:22px;font-weight:700;color:var(--navy);margin-bottom:8px">모든 미션 완료!</h2>
  <p style="font-size:14px;color:var(--textSub);line-height:1.7;margin-bottom:20px">수고하셨습니다.<br>강사 화면에서 최종 점수를 확인하세요.</p>
  <div style="display:inline-block;background:var(--orangePl);color:var(--orange);font-size:16px;font-weight:600;padding:14px 28px;border-radius:14px;border:2px solid var(--orange)">성찰일지 +5점 포함 — 최종 집계 중 ⏳</div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── Firebase 설정 ──
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyC_Gdcs6y_Eh_EFb7xrhLNvu4-6we3pCHk",
  authDomain:        "gbl-sch14.firebaseapp.com",
  databaseURL:       "https://gbl-sch14-default-rtdb.firebaseio.com",
  projectId:         "gbl-sch14",
  storageBucket:     "gbl-sch14.firebasestorage.app",
  messagingSenderId: "713132939192",
  appId:             "1:713132939192:web:6aa9d0a027dcffe731e14d"
};

const SESSION = 'gbl2024';
let db = null;

// Firebase 초기화 (실패해도 UI는 정상 작동)
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
} catch(e) {
  console.warn('Firebase 초기화 실패:', e);
}

// ── 데이터 ──
const TEAMS = [
  {id:'t1', num:'1조', name:'나침반'},
  {id:'t2', num:'2조', name:'씨앗'},
  {id:'t3', num:'3조', name:'파도'},
  {id:'t4', num:'4조', name:'별자리'},
];
const ROLES = [
  {id:'leader',    icon:'🧭', name:'리더',      desc:'조 진행 총괄'},
  {id:'recorder',  icon:'📝', name:'기록자',    desc:'논의 내용 정리'},
  {id:'presenter', icon:'🎤', name:'발표자',    desc:'결과 발표'},
  {id:'timer',     icon:'⏱',  name:'시간관리자', desc:'진행 체크'},
];
const MISSIONS = [
  {id:'m1', label:'M1 목표설정', color:'#E8650A', time:'5분',
   title:'목표 설정 — 청소년 집단상담 프로그램 기획',
   desc:'청소년 집단상담 프로그램의 목표를 설정하고, GBL 4요소(목표·규칙·피드백·자발적 참여) 중 3가지 이상을 반영하는 방법을 구체적으로 제시하세요.',
   fields:[
     {key:'target', label:'① 대상 청소년 집단 (구체적으로)', ph:'예) 학교폭력 피해 경험 중학생 / 진로 미결정 고등학생'},
     {key:'goals',  label:'② 프로그램 목표 3가지 이상', ph:'예)\n1. 자기효능감 향상\n2. 또래 관계 개선\n3. 진로 탐색 동기 증진'},
     {key:'gbl',    label:'③ 반영할 GBL 요소 3가지 + 적용 방법', ph:'예)\n- 규칙 → 차례 지키기\n- 피드백 → 점수판 공개\n- 참여 → 역할카드 선택'},
   ]},
  {id:'m2', label:'M2 시나리오', color:'#1D9E75', time:'10분',
   title:'시나리오 작성 — 1회기 게임화 활동 설계',
   desc:'1회기(50분) 집단상담 활동을 게임 형식으로 시나리오화하세요. 도입-전개-마무리 단계, 사용 도구, 촉진자(상담사) 역할을 모두 포함해야 합니다.',
   fields:[
     {key:'intro',       label:'① 도입 단계 (_분) — 준비·규칙 설명', ph:'예) 역할카드 배분 → 게임 규칙 안내 → 아이스브레이킹'},
     {key:'main',        label:'② 전개 단계 (_분) — 핵심 게임 활동', ph:'예) 미션카드 수행 → 실시간 점수 부여 → 중간 피드백'},
     {key:'close',       label:'③ 마무리 단계 (_분) — 정리·공유', ph:'예) 조별 발표 → 소감 나누기 → 촉진자 총평'},
     {key:'tools',       label:'④ 사용 도구·자료 목록', ph:'예) 미션카드, 점수판, 타이머, A3 용지, 마커펜'},
     {key:'facilitator', label:'⑤ 촉진자 역할 및 개입 방법', ph:'예) 규칙 중재 / 소극적 참여자 격려 / 갈등 개입 기준'},
   ]},
  {id:'m3', label:'M3 루브릭', color:'#F5A623', time:'10분',
   title:'루브릭 설계 — 참여자 평가 기준 만들기',
   desc:'참여자 평가 루브릭(3개 기준 이상)을 작성하고, 즉각적 피드백 방식과 마무리 정리 방법을 함께 제시하세요.',
   fields:[
     {key:'rubric',   label:'① 평가 루브릭 (기준/우수/보통/미흡)', ph:'예)\n참여도 | 매 활동 적극 참여 | 대부분 참여 | 소극적\n창의성 | 독창적 아이디어 | 표준적 수행 | 단순 반복'},
     {key:'feedback', label:'② 즉각적 피드백 방식', ph:'예) 미션 완료 즉시 스티커 부착 + 점수판 업데이트'},
     {key:'wrap',     label:'③ 마무리 정리 방법', ph:'예) 루브릭 점수 합산 → 조별 시상 → 소감 나누기'},
   ]},
  {id:'reflect', label:'성찰', color:'#2A4A72', time:'10분',
   title:'개인 성찰 — 오늘 수업 돌아보기',
   desc:'아래 3가지 질문에 솔직하게 작성하고 제출하면 +5점이 부여됩니다.',
   fields:[
     {key:'q1', label:'① 오늘 수업에서 가장 인상 깊었던 장면은?', ph:'구체적인 순간이나 활동을 떠올려 쓰세요.'},
     {key:'q2', label:'② 게임기반 학습의 핵심 원리 중 내가 직접 경험한 것은?', ph:'목표 / 규칙 / 피드백 / 자발적 참여 중 선택하여 서술'},
     {key:'q3', label:'③ 청소년 상담 현장에서 오늘 배운 GBL을 어떻게 활용할까?', ph:'구체적인 상담 상황과 연결하여 서술'},
   ]},
];

let myTeam = null, myName = '', myRole = '';
let submittedMissions = new Set();
let currentMission = 'm1';

// ── 설정 화면 렌더링 ──
function renderSetup() {
  const tg = document.getElementById('team-grid');
  TEAMS.forEach(t => {
    const b = document.createElement('div');
    b.className = 'team-btn';
    b.innerHTML = '<div class="t-num">'+t.num+'</div><div class="t-name">'+t.name+'</div>';
    b.onclick = () => {
      document.querySelectorAll('.team-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); myTeam = t;
    };
    tg.appendChild(b);
  });

  const rg = document.getElementById('role-grid');
  ROLES.forEach(r => {
    const b = document.createElement('div');
    b.className = 'role-btn';
    b.innerHTML = '<div class="role-icon">'+r.icon+'</div><div class="role-name">'+r.name+'</div><div class="role-desc">'+r.desc+'</div>';
    b.onclick = () => {
      document.querySelectorAll('.role-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); myRole = r.name;
    };
    rg.appendChild(b);
  });

  document.getElementById('btn-start').onclick = startSession;
}

function startSession() {
  myName = document.getElementById('name-input').value.trim();
  if(!myName){ showToast('이름을 입력해주세요'); return; }
  if(!myTeam){ showToast('조를 선택해주세요'); return; }
  if(!myRole){ showToast('역할을 선택해주세요'); return; }

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('mission-screen').style.display = 'block';
  document.getElementById('app-header-info').textContent = myTeam.num+' · '+myName+' · '+myRole;

  if(db) registerMember();
  renderMissions();
  if(db) loadAnswers();
}

function registerMember() {
  try {
    const path = SESSION+'/members/'+myTeam.id+'/'+myName.replace(/\s/g,'_');
    db.ref(path).set({name:myName, role:myRole, team:myTeam.num});
  } catch(e){ console.warn(e); }
}

// ── 미션 렌더링 ──
function renderMissions() {
  const nav = document.getElementById('mission-nav');
  const body = document.getElementById('mission-body');
  nav.innerHTML = ''; body.innerHTML = '';

  MISSIONS.forEach(m => {
    const tab = document.createElement('div');
    tab.className = 'mission-tab'+(m.id==='m1'?' active':'');
    tab.textContent = m.label;
    tab.dataset.id = m.id;
    tab.onclick = () => switchMission(m.id);
    nav.appendChild(tab);

    const panel = document.createElement('div');
    panel.id = 'panel-'+m.id;
    panel.style.display = m.id==='m1'?'block':'none';

    const submitLabel = m.id==='reflect'?'성찰 제출 (+5점)':m.id.toUpperCase()+' 제출 — 완료!';
    panel.innerHTML =
      '<div class="mission-card">'+
        '<div class="mission-head">'+
          '<div class="mission-badge" style="background:'+m.color+'">'+(m.id==='reflect'?'✍':m.id.toUpperCase())+'</div>'+
          '<div class="mission-head-info"><h3>'+m.title+'</h3><p>제한 시간: '+m.time+'</p></div>'+
        '</div>'+
        '<div class="mission-desc">'+m.desc+'</div>'+
        '<div class="field-group" id="fields-'+m.id+'"></div>'+
        '<div class="submit-row">'+
          '<button class="btn-submit" id="submit-'+m.id+'" onclick="submitMission(\''+m.id+'\')">'+submitLabel+'</button>'+
          '<span class="save-status" id="status-'+m.id+'">자동저장</span>'+
        '</div>'+
      '</div>';

    const fg = panel.querySelector('#fields-'+m.id);
    m.fields.forEach(f => {
      const lbl = document.createElement('label');
      lbl.textContent = f.label;
      const ta = document.createElement('textarea');
      ta.placeholder = f.ph;
      ta.rows = 4;
      ta.dataset.key = f.key;
      ta.dataset.mission = m.id;
      ta.oninput = () => autoSave(m.id, f.key, ta.value);
      fg.appendChild(lbl);
      fg.appendChild(ta);
    });

    body.appendChild(panel);
  });

  updateProgress();
}

function switchMission(id) {
  currentMission = id;
  document.querySelectorAll('.mission-tab').forEach(t=>t.classList.toggle('active', t.dataset.id===id));
  MISSIONS.forEach(m => {
    const p = document.getElementById('panel-'+m.id);
    if(p) p.style.display = m.id===id?'block':'none';
  });
}

// ── Firebase 저장 ──
function autoSave(missionId, fieldKey, value) {
  if(!db||!myTeam) return;
  try {
    db.ref(SESSION+'/submissions/'+myTeam.id+'/'+missionId+'/'+fieldKey)
      .set({value:value, name:myName, role:myRole});
    const st = document.getElementById('status-'+missionId);
    if(st){ st.textContent='저장됨 ✓'; st.className='save-status ok'; }
  } catch(e){ console.warn(e); }
}

function loadAnswers() {
  if(!db||!myTeam) return;
  db.ref(SESSION+'/submissions/'+myTeam.id).on('value', snap => {
    const data = snap.val()||{};
    MISSIONS.forEach(m => {
      m.fields.forEach(f => {
        const ta = document.querySelector('textarea[data-mission="'+m.id+'"][data-key="'+f.key+'"]');
        if(ta && data[m.id]&&data[m.id][f.key]&&data[m.id][f.key].value && !ta.value){
          ta.value = data[m.id][f.key].value;
        }
      });
      if(data[m.id]&&data[m.id]._submitted) markSubmitted(m.id);
    });
  });
}

function submitMission(missionId) {
  const btn = document.getElementById('submit-'+missionId);
  btn.innerHTML = '<span class="spinner"></span>제출 중...';
  btn.disabled = true;

  if(!db||!myTeam) {
    // Firebase 없어도 로컬에서 완료 처리
    markSubmitted(missionId);
    showToast(missionId==='reflect'?'성찰 완료! +5점 🎉':missionId.toUpperCase()+' 완료! 🏆');
    const next = {m1:'m2',m2:'m3',m3:'reflect'}[missionId];
    if(next) setTimeout(()=>switchMission(next), 800);
    if(missionId==='reflect') checkAllDone();
    return;
  }

  db.ref(SESSION+'/submissions/'+myTeam.id+'/'+missionId+'/_submitted')
    .set({by:myName, role:myRole, at:Date.now()})
    .then(() => {
      markSubmitted(missionId);
      showToast(missionId==='reflect'?'성찰 제출 완료! +5점 🎉':missionId.toUpperCase()+' 완료 제출! 🏆');
      db.ref(SESSION+'/log').push({
        team:myTeam.num, teamId:myTeam.id,
        member:myName, role:myRole,
        event:missionId+'_submitted', at:Date.now()
      });
      const next = {m1:'m2',m2:'m3',m3:'reflect'}[missionId];
      if(next) setTimeout(()=>switchMission(next), 800);
      if(missionId==='reflect') checkAllDone();
    })
    .catch(e => {
      console.warn(e);
      btn.textContent = '다시 시도';
      btn.disabled = false;
      showToast('저장 오류. 다시 눌러주세요.');
    });
}

function markSubmitted(missionId) {
  submittedMissions.add(missionId);
  const btn = document.getElementById('submit-'+missionId);
  if(btn){ btn.textContent='✓ 제출 완료'; btn.className='btn-submit done'; btn.disabled=true; }
  const tab = document.querySelector('.mission-tab[data-id="'+missionId+'"]');
  if(tab){ tab.classList.remove('active'); tab.classList.add('done'); }
  const st = document.getElementById('status-'+missionId);
  if(st){ st.textContent='제출 완료'; st.className='save-status ok'; }
  updateProgress();
}

function updateProgress() {
  const total = MISSIONS.length, done = submittedMissions.size;
  const pct = Math.round(done/total*100);
  const fill = document.getElementById('progress-fill');
  const label = document.getElementById('progress-label-done');
  const pctEl = document.getElementById('progress-pct');
  if(fill) fill.style.width = pct+'%';
  if(label) label.textContent = done+' / '+total+' 완료';
  if(pctEl) pctEl.textContent = pct+'%';
}

function checkAllDone() {
  if(submittedMissions.size >= MISSIONS.length){
    setTimeout(()=>{
      document.getElementById('mission-screen').style.display='none';
      document.getElementById('complete-screen').style.display='block';
    },1000);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// 초기화
renderSetup();
</script>
</body>
</html>
